<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="badgeGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFE9B8"/>
      <stop offset="55%" stop-color="#F4A340"/>
      <stop offset="100%" stop-color="#E0742F"/>
    </radialGradient>
  </defs>

  <!-- circular badge -->
  <circle cx="32" cy="32" r="30" fill="url(#badgeGrad)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1B2A4A" stroke-width="2.5"/>

  <!-- bold, simplified bird silhouette — kept chunky so it survives 16x16 -->
  <g fill="#1B2A4A">
    <!-- tail -->
    <path d="M16 38 Q7 33 12 25 Q22 27 25 36 Z"/>
    <!-- body -->
    <ellipse cx="33" cy="34" rx="17" ry="14"/>
    <!-- wing -->
    <path d="M23 32 Q31 24 43 30 Q34 34 23 32 Z" fill="#FF6B6B"/>
    <!-- beak -->
    <path d="M47 30 L58 27 L48 37 Z" fill="#FF9F45"/>
  </g>

  <!-- eye: white ring + dark pupil, high contrast for tiny sizes -->
  <circle cx="41" cy="27" r="5" fill="#FFF8EC"/>
  <circle cx="42.4" cy="26" r="2.6" fill="#1B2A4A"/>
</svg>
